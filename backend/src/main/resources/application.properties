# ============================================================
#  RestaurantPro \u2014 application.properties
# ============================================================

# Server
server.port=8081

# DataSource MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurantpro?useSSL=false&serverTimezone=Africa/Tunis&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=RestaurantPro_Super_Secret_Key_2025_VeryLong_AndSecure!
jwt.expiration=86400000

# Logging
logging.level.com.restaurantpro=DEBUG
